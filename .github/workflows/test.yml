name: Tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  unit:
    name: Unit ${{ matrix.target }} (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        haxe: ["4", "5"]
        target: [jvm, neko, js, php, cpp, hl]
        include:
          - { haxe: "4", name: "Haxe 4", version: "4.3.7" }
          - { haxe: "5", name: "Haxe 5", version: "2026-01-05_development_3aed86e" }
        exclude:
          # cpp and hl do not build on the Haxe 5 nightly (upstream issues).
          - { haxe: "5", target: cpp }
          - { haxe: "5", target: hl }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup hxwell
        uses: ./.github/actions/setup-hxwell
        with:
          version: ${{ matrix.version }}
          major: ${{ matrix.haxe }}
          target: ${{ matrix.target }}

      - name: Install test dependencies
        if: matrix.haxe == '4'
        run: haxelib install utest --quiet
      - name: Install test dependencies (Haxe 5)
        if: matrix.haxe == '5'
        run: haxelib git utest https://github.com/haxe-utest/utest.git

      - name: Run unit tests
        run: bash tests/unit/run.sh ${{ matrix.target }}

  e2e:
    name: E2E ${{ matrix.pair.target }}/${{ matrix.pair.driver }} (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        haxe: ["4", "5"]
        pair:
          - { target: jvm, driver: socket }
          - { target: jvm, driver: undertow }
          - { target: neko, driver: socket }
          - { target: cpp, driver: socket }
          - { target: hl, driver: socket }
          - { target: js, driver: nodehttp }
          - { target: php, driver: php }
        include:
          - { haxe: "4", name: "Haxe 4", version: "4.3.7" }
          - { haxe: "5", name: "Haxe 5", version: "2026-01-05_development_3aed86e" }
        exclude:
          # cpp and hl do not build on the Haxe 5 nightly (upstream issues).
          - { haxe: "5", pair: { target: cpp, driver: socket } }
          - { haxe: "5", pair: { target: hl, driver: socket } }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup hxwell
        uses: ./.github/actions/setup-hxwell
        with:
          version: ${{ matrix.version }}
          major: ${{ matrix.haxe }}
          target: ${{ matrix.pair.target }}

      - name: Run e2e tests
        run: bash tests/e2e/run.sh ${{ matrix.pair.target }} ${{ matrix.pair.driver }}
